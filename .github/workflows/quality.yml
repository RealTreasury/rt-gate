name: Quality

on:
  pull_request:
    branches:
      - '**'
  push:
    branches:
      - '**'

jobs:
  validate-page-config:
    name: Validate RTG page config
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Show Node.js version
        run: node --version

      - name: Validate RTG page config
        run: node scripts/validate-rtg-page-config.mjs
